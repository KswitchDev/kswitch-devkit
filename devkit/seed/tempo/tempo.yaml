# Tempo configuration — Developer Edition observability lite.
# OTLP receiver on :4317 (gRPC). Single-tenant, local-disk storage.
# Retention: 24h (Developer Edition defaults). Developers can raise retention by
# editing `storage.trace.wal.path` retention parameters.

stream_over_http_enabled: true
server:
  http_listen_port: 3200
  grpc_listen_port: 9095

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

ingester:
  trace_idle_period: 10s
  max_block_bytes: 1_000_000
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h

storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo/blocks
    wal:
      path: /tmp/tempo/wal

usage_report:
  reporting_enabled: false
