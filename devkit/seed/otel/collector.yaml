# OpenTelemetry Collector configuration — pilot observability lite.
# Receives OTLP gRPC + HTTP from the KSwitch app, fans out to:
#   - prometheus (metrics, scraped from this collector's :8889)
#   - tempo (traces, OTLP gRPC at tempo:4317)
#
# The app emits OTEL only when OTEL_ENABLED=true in its environment.
# Bring the observability stack up first, then set OTEL_ENABLED=true
# in .env and `docker compose up -d app` to enable telemetry.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1024
    timeout: 10s

  memory_limiter:
    check_interval: 5s
    limit_mib: 200
    spike_limit_mib: 50

exporters:
  # Metrics endpoint for Prometheus to scrape.
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: kswitch

  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]

    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [otlp/tempo]

  telemetry:
    logs:
      level: info
