[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "kswitch-sdk"
version = "0.1.0"
description = "Python SDK for the KSwitch Agent Trust Control Plane"
readme = "README.md"
requires-python = ">=3.9"
authors = [{ name = "KSwitch" }]
classifiers = [
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
]

[tool.setuptools.packages.find]
where = ["src"]
