agent {
    data_dir = "/var/lib/spire/agent"
    log_level = "INFO"
    trust_domain = "kswitch.ai"
    server_address = "spire-server"
    server_port = "8081"
    socket_path = "/var/run/spire/agent.sock"
    insecure_bootstrap = true
}

plugins {
    NodeAttestor "join_token" {
        plugin_data {}
    }

    KeyManager "disk" {
        plugin_data {
            directory = "/var/lib/spire/agent"
        }
    }

    WorkloadAttestor "unix" {
        plugin_data {
            discover_workload_path = false
        }
    }
}
