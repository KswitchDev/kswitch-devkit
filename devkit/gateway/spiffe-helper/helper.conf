# spiffe-helper configuration for KSwitch gateway
# Reads SVIDs from SPIRE workload API and writes to /certs/
# Envoy mounts the same /certs/ volume for mTLS

agent_address = "/var/run/spire/agent.sock"

# Output paths — Envoy reads these
svid_file_name     = "svid.pem"
svid_key_file_name = "svid_key.pem"
svid_bundle_file_name = "bundle.pem"

# Cmd to run on cert renewal (reload Envoy with SDS if enabled)
# Empty = just write files and continue
cmd = ""
cmd_args = ""

# Renew before expiry (5 minutes before SVID TTL)
renew_signal = "SIGUSR1"
