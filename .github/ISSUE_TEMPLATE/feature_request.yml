name: Feature or example request
description: Request a DevKit capability, SDK improvement, example, or integration guide.
title: "[Request]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for public requests that help prioritize DevKit, SDK, MCP, and example work.
  - type: dropdown
    id: request_type
    attributes:
      label: Request type
      options:
        - SDK capability
        - DevKit local runtime
        - MCP server or governing proxy
        - Example application
        - Integration guide
        - Policy or audit workflow
        - Workload identity
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to build, prove, or evaluate?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Requested change
      description: Describe the capability, example, guide, or improvement you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention any workaround, related tool, or existing example you tried.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public issue safety check
      options:
        - label: I have removed secrets, tokens, customer data, private URLs, and sensitive logs from this issue.
          required: true
