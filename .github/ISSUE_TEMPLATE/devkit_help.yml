name: Usage help
description: Ask for help with local setup, SDK usage, examples, or MCP integration.
title: "[Help]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for public, non-sensitive DevKit questions. For private environment details or production incidents, use the support link instead of opening a public issue.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - DevKit local runtime
        - Python SDK
        - TypeScript SDK
        - Go SDK
        - MCP server or governing proxy
        - Workload identity
        - Policy or audit flow
        - Not sure
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the outcome you want, not only the command that failed.
    validations:
      required: true
  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Include commands, docs pages, examples, or SDK calls you already used.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Non-sensitive context
      description: Include OS, package versions, local runtime state, or sanitized errors if relevant.
    validations:
      required: false
  - type: checkboxes
    id: safety
    attributes:
      label: Public issue safety check
      options:
        - label: I have removed secrets, tokens, customer data, private URLs, and sensitive logs from this issue.
          required: true
