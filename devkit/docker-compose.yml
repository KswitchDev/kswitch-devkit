# KSwitch Developer Edition - minimal public SDK verification stack
#
# This compose is intentionally narrow. It is not a production topology and it
# does not expose commercial gateway, scanner, runtime-ops, observability, or
# secret-management internals. The public devkit exists to let SDK users test
# against a local control plane and optional SPIFFE workload identity.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"

x-app-env: &app-env
  KSWITCH_CUSTOMER_ID: ${KSWITCH_CUSTOMER_ID:?KSWITCH_CUSTOMER_ID required}
  KSWITCH_DEPLOYMENT_TARGET: ${KSWITCH_DEPLOYMENT_TARGET:-laptop}
  KSWITCH_ENV: production
  OIDC_ISSUER: http://localhost:3001/realms/kswitch
  OIDC_ISSUER_INTERNAL: http://keycloak:8080/realms/kswitch
  OIDC_JWKS_URI: http://localhost:3001/realms/kswitch/protocol/openid-connect/certs
  OIDC_JWKS_URI_INTERNAL: http://keycloak:8080/realms/kswitch/protocol/openid-connect/certs
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: agent_register
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kswitch-developer-postgres}
  DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-kswitch-developer-postgres}@postgres:5432/agent_register
  REDIS_URL: redis://valkey:6379/0
  OPA_URL: http://opa:8181
  AUTH_DISABLED: "false"
  ENABLE_BACKGROUND_WORKERS: "false"
  VAULT_ENABLED: "false"
  VAULT_FALLBACK_ALLOWED: "false"

services:
  postgres:
    image: postgres:18
    container_name: kswitch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agent_register
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kswitch-developer-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - kswitch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_register"]
      interval: 10s
      timeout: 5s
      retries: 12
    deploy:
      resources:
        limits:
          memory: 4g
    logging: *default-logging

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: kswitch-keycloak
    restart: unless-stopped
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-kswitch-developer-keycloak}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "127.0.0.1:3001:8080"
    volumes:
      - keycloak-data:/opt/keycloak/data
      - ./seed/realm-export.json:/opt/keycloak/data/import/kswitch-realm.json:ro
    networks:
      - kswitch-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && head -1 <&3 | grep -q 200"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2g
    logging: *default-logging

  app-init:
    image: ghcr.io/maxcope-alt/kswitch:${KSWITCH_IMAGE_TAG:-v1.39.0-pg}
    container_name: kswitch-app-init
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *app-env
      KSWITCH_ROLE: bootstrap
      KSWITCH_ONE_SHOT_BOOTSTRAP: "true"
      KSWITCH_BOOTSTRAP_DONE: "false"
      OPA_ENABLED: "false"
    networks:
      - kswitch-net
    entrypoint: ["python3", "scripts/init_runtime_bootstrap.py"]
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging

  app:
    image: ghcr.io/maxcope-alt/kswitch:${KSWITCH_IMAGE_TAG:-v1.39.0-pg}
    container_name: kswitch-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
      app-init:
        condition: service_completed_successfully
      opa:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      <<: *app-env
      KSWITCH_BOOTSTRAP_DONE: "true"
    ports:
      - "127.0.0.1:5001:5001"
    volumes:
      - ./developer-edition/licence_loader.py:/app/app/licence/loader.py:ro
      - ./state:/var/lib/kswitch/state:rw
      - ./tls:/var/lib/kswitch/tls:ro
    networks:
      - kswitch-net
    healthcheck:
      test: ["CMD", "curl", "-fk", "https://localhost:5001/api/v1/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4g
    logging: *default-logging

  valkey:
    image: valkey/valkey:8
    container_name: kswitch-valkey
    restart: unless-stopped
    networks:
      - kswitch-net
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 1g
    logging: *default-logging

  falkordb:
    image: falkordb/falkordb:latest
    container_name: kswitch-falkordb
    restart: unless-stopped
    networks:
      - kswitch-net
    deploy:
      resources:
        limits:
          memory: 2g
    logging: *default-logging

  opa:
    image: openpolicyagent/opa:1.15.1-envoy-static
    container_name: kswitch-opa
    restart: unless-stopped
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
    networks:
      - kswitch-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8181/health"]
      interval: 10s
      timeout: 3s
      retries: 6
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging

  spire-server:
    image: ghcr.io/spiffe/spire-server:1.11.0
    container_name: kswitch-spire-server
    profiles: ["identity"]
    restart: unless-stopped
    command: ["-config", "/etc/spire/server/server.conf"]
    volumes:
      - ./seed/spire-server.conf:/etc/spire/server/server.conf:ro
      - spire-data:/var/lib/spire/server
      - spire-server-socket:/tmp/spire-server/private
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-server", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - kswitch-net
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging

  spire-agent:
    image: ghcr.io/spiffe/spire-agent:1.11.0
    container_name: kswitch-spire-agent
    profiles: ["identity"]
    restart: unless-stopped
    depends_on:
      spire-server:
        condition: service_healthy
    volumes:
      - ./seed/spire-agent.conf:/etc/spire/agent/agent.conf:ro
      - spire-agent-socket:/var/run/spire
      - spire-server-socket:/tmp/spire-server/private:ro
      - spire-data:/var/lib/spire/agent
    healthcheck:
      test: ["CMD", "/opt/spire/bin/spire-agent", "healthcheck", "-socketPath", "/var/run/spire/agent.sock"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - kswitch-net
    deploy:
      resources:
        limits:
          memory: 512m
    logging: *default-logging

volumes:
  postgres-data:
  keycloak-data:
  spire-data:
  spire-server-socket:
  spire-agent-socket:

networks:
  kswitch-net:
    driver: bridge
