name: SDK CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest tests -q

  typescript:
    name: TypeScript
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: typescript/package-lock.json
      - run: npm ci
      - run: npm test

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - run: go test ./...

  devkit:
    name: Developer Edition Devkit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: devkit
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/verify-developer-edition.py
      - run: cp .env.example .env
      - run: perl -0pi -e 's/KEYCLOAK_ADMIN_PASSWORD=CHANGE-ME-developer-keycloak/KEYCLOAK_ADMIN_PASSWORD=DeveloperLocalSecret2026/g' .env
      - run: make developer-limits
      - run: docker compose -f docker-compose.yml --profile identity --profile gateway config
      - name: Verify public runtime images are pullable
        run: |
          set -euo pipefail
          tag="$(awk -F= '/^KSWITCH_IMAGE_TAG=/{print $2}' .env)"
          docker manifest inspect "ghcr.io/maxcope-alt/kswitch:${tag}" >/dev/null
          docker manifest inspect "ghcr.io/maxcope-alt/kswitch-spire-agent-wrapper:1.10" >/dev/null
