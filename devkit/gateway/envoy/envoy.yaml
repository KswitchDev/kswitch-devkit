# KSwitch Gateway — Envoy configuration (DevKit)
# ---------------------------------------------------------
# Ported from gateway/envoy/envoy.yaml in the source repo
# (lines 1-175). Two differences for the devkit:
#   1. Upstream cluster renamed to `gateway-upstream` to match the
#      bundle service name. Commercial deployments replace this with
#      the address of their real MCP / agent upstream.
#   2. OPA cluster renamed to `gateway-opa` to match the bundle
#      service name.
# Everything else (route exemptions, ext_authz fail-closed behaviour,
# the L2H-3 internal-header-strip Lua filter, the access log JSON
# shape) matches the source verbatim.
#
# Fail-closed (mandatory):
#   failure_mode_allow: false  — OPA down ⇒ request DENIED
#   timeout: 0.05s             — OPA slower than 50ms ⇒ DENIED
#   Authorization header is forwarded to the upstream.
#
# Exempt routes (no token required):
#   /health, /ready, /api/v1/jwks

admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: ingress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: kswitch_gateway
                codec_type: AUTO
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                      log_format:
                        json_format:
                          timestamp: "%START_TIME%"
                          method: "%REQ(:METHOD)%"
                          path: "%REQ(:PATH)%"
                          protocol: "%PROTOCOL%"
                          response_code: "%RESPONSE_CODE%"
                          response_flags: "%RESPONSE_FLAGS%"
                          duration_ms: "%DURATION%"
                          upstream_host: "%UPSTREAM_HOST%"
                          request_id: "%REQ(X-REQUEST-ID)%"
                route_config:
                  name: local_routes
                  virtual_hosts:
                    - name: kswitch_backend
                      domains: ["*"]
                      routes:
                        - match:
                            path: /health
                          route:
                            cluster: gateway-upstream
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: /ready
                          route:
                            cluster: gateway-upstream
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            path: /api/v1/jwks
                          route:
                            cluster: gateway-upstream
                          typed_per_filter_config:
                            envoy.filters.http.ext_authz:
                              "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthzPerRoute
                              disabled: true
                        - match:
                            prefix: /
                          route:
                            cluster: gateway-upstream
                            timeout: 30s
                http_filters:
                  - name: envoy.filters.http.ext_authz
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.ext_authz.v3.ExtAuthz
                      transport_api_version: V3
                      failure_mode_allow: false
                      with_request_body:
                        max_request_bytes: 8192
                        allow_partial_message: true
                      grpc_service:
                        envoy_grpc:
                          cluster_name: gateway-opa
                        timeout: 0.05s
                  - name: envoy.filters.http.lua
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                      default_source_code:
                        inline_string: |
                          function envoy_on_request(request_handle)
                            request_handle:headers():remove("x-kswitch-agent-id")
                            request_handle:headers():remove("x-kswitch-decision")
                            request_handle:headers():remove("x-execution-token")
                            request_handle:headers():remove("x-spiffe-id")
                            request_handle:headers():remove("x-kswitch-enforcement-id")
                          end
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: gateway-upstream
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 5s
      load_assignment:
        cluster_name: gateway-upstream
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: gateway-upstream
                      port_value: 8080

    - name: gateway-opa
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      connect_timeout: 1s
      http2_protocol_options: {}
      load_assignment:
        cluster_name: gateway-opa
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: gateway-opa
                      port_value: 9191
