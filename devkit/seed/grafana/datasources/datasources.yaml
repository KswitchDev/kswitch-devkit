# Grafana datasource provisioning — Developer Edition observability lite.
# Auto-loaded at Grafana startup; no UI clicks required.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-developer
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Tempo
    type: tempo
    uid: tempo-developer
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: prometheus-developer
